function add(a, b) {
  return a + b;
}

console.log(add(10, 20));

const multiply = (x, y) => x * y;

console.log(multiply(5, 4));

const fruits = ["Apple", "Banana", "Mango"];

console.log(fruits[0]); // Apple

fruits.push("Orange"); // add to end
console.log(fruits); // ["Apple", "Banana", "Mango", "Orange"]

fruits.pop(); // remove last
console.log(fruits); // ["Apple", "Banana", "Mango"]

fruits.shift(); // remove first
console.log(fruits); // ["Banana", "Mango"]

fruits.unshift("Kiwi"); // add first
console.log(fruits); // ["Kiwi", "Banana", "Mango"]

fruits.includes("Mango"); 
console.log(fruits.includes("Mango")); // true


const student = {
  name: "Arjun",
  age: 22,
  course: "Frontend",
};

console.log(student.name); // Arjun

student.city = "Mumbai"; // add
console.log(student); // { name: "Arjun", age: 22, course: "Frontend", city: "Mumbai" }


student.age = 23; // update
console.log(student); // { name: "Arjun", age: 23, course: "Frontend", city: "Mumbai" }


delete student.course; // delete
console.log(student); // { name: "Arjun", age: 23, city: "Mumbai" }
